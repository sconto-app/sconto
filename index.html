
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sconti Subito</title>
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sconti Subito">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c26;
    --green: #00e676; --blue: #448aff; --orange: #ff9100;
    --red: #ff1744; --text: #f0f0f5; --muted: #6b6b80; --border: #2a2a3a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  .header { padding: 52px 24px 20px; display: flex; align-items: center; gap: 14px; }
  .header-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--green), #00b248); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; box-shadow: 0 4px 20px rgba(0,230,118,0.3); }
  .header h1 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--text); line-height: 1.1; }
  .header p { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .tabs { display: flex; margin: 0 20px 16px; background: var(--surface); border-radius: 14px; padding: 4px; gap: 4px; border: 1.5px solid var(--border); }
  .tab { flex: 1; padding: 10px; border: none; background: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .tab.active { background: var(--surface2); color: var(--text); }

  .main { padding: 0 20px 120px; display: flex; flex-direction: column; gap: 16px; }

  .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 20px; position: relative; }
  .card::before { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s; pointer-events: none; border-radius: 20px; }
  .card.blue::before { background: radial-gradient(circle at 20% 50%, rgba(68,138,255,0.08) 0%, transparent 70%); }
  .card.orange::before { background: radial-gradient(circle at 20% 50%, rgba(255,145,0,0.08) 0%, transparent 70%); }
  .card.active::before { opacity: 1; }
  .card.active.blue { border-color: rgba(68,138,255,0.5); }
  .card.active.orange { border-color: rgba(255,145,0,0.5); }

  .card-row { display: flex; align-items: center; gap: 14px; }
  .card-icon { width: 46px; height: 46px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .blue .card-icon { background: rgba(68,138,255,0.15); }
  .orange .card-icon { background: rgba(255,145,0,0.15); }
  .card-label { font-size: 12px; color: var(--muted); margin-bottom: 3px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-value { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; color: var(--text); }
  .card-value.placeholder { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 400; color: var(--muted); }

  .insert-btn { margin-top: 12px; width: 100%; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s; border: none; }
  .insert-btn:active { opacity: 0.7; }
  .insert-btn.blue { background: rgba(68,138,255,0.15); border: 1.5px solid rgba(68,138,255,0.4); color: #448aff; }
  .insert-btn.orange { background: rgba(255,145,0,0.15); border: 1.5px solid rgba(255,145,0,0.4); color: #ff9100; }

  .divider { display: flex; align-items: center; gap: 12px; padding: 0 4px; }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  .result { background: linear-gradient(135deg, #0d2b1a, #0a1f2e); border: 1.5px solid rgba(0,230,118,0.25); border-radius: 24px; padding: 24px; text-align: center; display: none; animation: fadeUp 0.4s ease; overflow: hidden; }
  .result.show { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .result-label { font-size: 11px; color: rgba(0,230,118,0.6); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
  .result-price { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--green); line-height: 1; text-shadow: 0 0 40px rgba(0,230,118,0.3); font-size: clamp(36px, 12vw, 58px); }
  .result-saving { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; padding: 6px 16px; background: rgba(0,230,118,0.12); border-radius: 20px; font-size: 14px; font-weight: 500; color: var(--green); }

  .result-actions { display: flex; gap: 10px; margin-top: 16px; }
  .btn-add-cart { flex: 2; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--green), #00b248); color: #000; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s; }
  .btn-add-cart:active { opacity: 0.8; }
  .btn-reset-calc { flex: 1; padding: 14px; border: 1.5px solid var(--border); border-radius: 12px; background: none; color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-reset-calc:active { color: var(--text); }

  /* Carrello */
  #panelCarrello { display: none; }
  #panelCarrello.show { display: flex; flex-direction: column; gap: 16px; }

  .empty-cart { text-align: center; padding: 48px 24px; color: var(--muted); }
  .empty-cart .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-cart p { font-size: 14px; line-height: 1.7; }

  .cart-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; animation: fadeUp 0.3s ease; }
  .cart-item-num { width: 28px; height: 28px; border-radius: 8px; background: var(--surface2); color: var(--muted); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-desc { font-size: 12px; color: var(--muted); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-item-price { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
  .cart-item-del { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,23,68,0.1); border: 1px solid rgba(255,23,68,0.2); color: var(--red); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .cart-item-del:active { background: rgba(255,23,68,0.25); }

  .add-full-price { background: var(--surface); border: 1.5px dashed var(--border); border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .add-full-price:active { border-color: var(--blue); }
  .add-full-price-text strong { font-size: 14px; font-weight: 600; color: var(--text); display: block; }
  .add-full-price-text span { font-size: 12px; color: var(--muted); }

  .cart-total-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: linear-gradient(135deg, #0d2b1a, #0a1f2e); border-top: 1.5px solid rgba(0,230,118,0.25); padding: 16px 20px 32px; display: none; }
  .cart-total-bar.show { display: block; }
  .cart-total-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cart-total-label { font-size: 12px; color: rgba(0,230,118,0.6); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
  .cart-total-num { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: var(--green); }
  .cart-total-sub { font-size: 12px; color: var(--muted); }
  .btn-reset-cart { width: 100%; padding: 12px; border: 1.5px solid rgba(255,23,68,0.3); border-radius: 12px; background: rgba(255,23,68,0.08); color: var(--red); font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-reset-cart:active { background: rgba(255,23,68,0.18); }

  .modal-bg { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); align-items: flex-end; justify-content: center; }
  .modal-bg.show { display: flex; }
  .modal-sheet { background: #13131a; border: 1px solid #2a2a3a; border-radius: 24px 24px 0 0; padding: 28px 24px 48px; width: 100%; max-width: 480px; }
  .modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 20px; }

  .toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 20px; font-size: 13px; color: var(--text); z-index: 999; white-space: nowrap; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🏷️</div>
  <div>
    <h1>Sconti Subito</h1>
    <p>Calcola il prezzo scontato istantaneamente</p>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tabCalc" onclick="switchTab('calc')">🧮 Calcola</button>
  <button class="tab" id="tabCart" onclick="switchTab('cart')">🛒 Carrello <span id="cartBadge" style="display:none;background:var(--green);color:#000;border-radius:6px;padding:1px 6px;font-size:11px;margin-left:4px">0</span></button>
</div>

<!-- CALCOLA -->
<div class="main" id="panelCalc">
  <div class="card blue active">
    <div class="card-row">
      <div class="card-icon">💶</div>
      <div style="flex:1">
        <div class="card-label">1 · Prezzo originale</div>
        <div class="card-value placeholder" id="valPrezzo">Tocca per inserire</div>
      </div>
    </div>
    <button class="insert-btn blue" onclick="apriManuale('prezzo')">✏️ Inserisci prezzo</button>
  </div>

  <div class="card orange active">
    <div class="card-row">
      <div class="card-icon">%</div>
      <div style="flex:1">
        <div class="card-label">2 · Percentuale sconto</div>
        <div class="card-value placeholder" id="valSconto">Tocca per inserire</div>
      </div>
    </div>
    <button class="insert-btn orange" onclick="apriManuale('sconto')">✏️ Inserisci sconto</button>
  </div>

  <div class="divider"><div class="divider-line"></div><div class="divider-text">Risultato</div><div class="divider-line"></div></div>

  <div class="result" id="risultato">
    <div class="result-label">Prezzo finale</div>
    <div class="result-price" id="prezzoFinale">—</div>
    <div class="result-saving" id="risparmio">💰 Risparmi —</div>
    <div class="result-actions">
      <button class="btn-add-cart" onclick="aggiungiAlCarrello()">＋ Aggiungi al carrello</button>
      <button class="btn-reset-calc" onclick="resetCalc()">↺ Nuovo</button>
    </div>
  </div>
</div>

<!-- CARRELLO -->
<div class="main" id="panelCarrello">
  <div class="add-full-price" onclick="apriManuale('diretto')">
    <div style="font-size:22px">💰</div>
    <div class="add-full-price-text" style="flex:1">
      <strong>Aggiungi prezzo intero</strong>
      <span>Senza sconto, prezzo già noto</span>
    </div>
    <div style="color:var(--muted);font-size:20px;font-weight:700">＋</div>
  </div>

  <div class="divider"><div class="divider-line"></div><div class="divider-text">Articoli</div><div class="divider-line"></div></div>

  <div id="cartList"></div>
</div>

<!-- Totale fisso -->
<div class="cart-total-bar" id="cartTotalBar">
  <div class="cart-total-row">
    <div>
      <div class="cart-total-label">Totale carrello</div>
      <div class="cart-total-sub" id="cartTotalSub">0 articoli</div>
    </div>
    <div class="cart-total-num" id="cartTotalNum">€ 0</div>
  </div>
  <button class="btn-reset-cart" onclick="svuotaCarrello()">🗑 Svuota carrello</button>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalManuale">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="manTitolo" style="font-family:Syne,sans-serif;font-size:18px;font-weight:700;color:#f0f0f5;margin-bottom:6px"></div>
    <div id="manSubtitle" style="font-size:13px;color:#6b6b80;margin-bottom:20px"></div>
    <div style="position:relative">
      <span id="manSymbol" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:22px;font-weight:700;color:#6b6b80">€</span>
      <input id="manInput" type="number" inputmode="decimal" step="0.01" min="0"
        style="width:100%;padding:16px 16px 16px 44px;background:#1c1c26;border:1.5px solid #2a2a3a;border-radius:14px;font-family:Syne,sans-serif;font-size:28px;font-weight:700;color:#f0f0f5;outline:none;-moz-appearance:textfield;appearance:textfield"
        placeholder="0" oninput="aggiornaBottoneConferma(this)">
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button onclick="chiudiManuale()" style="flex:1;padding:14px;background:#1c1c26;border:1.5px solid #2a2a3a;border-radius:12px;color:#6b6b80;font-size:15px;font-weight:600;cursor:pointer">Annulla</button>
      <button id="manConfirm" onclick="confermaManuale()" style="flex:2;padding:14px;border:none;border-radius:12px;font-family:Syne,sans-serif;font-size:16px;font-weight:700;color:#fff;cursor:pointer;opacity:0.4;transition:opacity 0.2s">✓ Conferma</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let prezzoOriginale = null, percentualeSconto = null;
  let tipoManuale = null;
  let ultimoFinale = null, ultimaDesc = null;
  let carrello = JSON.parse(localStorage.getItem('carrello') || '[]');

  aggiornaCarrello();

  function switchTab(tab) {
    document.getElementById('tabCalc').classList.toggle('active', tab === 'calc');
    document.getElementById('tabCart').classList.toggle('active', tab === 'cart');
    document.getElementById('panelCalc').style.display = tab === 'calc' ? 'flex' : 'none';
    const pc = document.getElementById('panelCarrello');
    if (tab === 'cart') pc.classList.add('show'); else pc.classList.remove('show');
    const bar = document.getElementById('cartTotalBar');
    bar.classList.toggle('show', tab === 'cart' && carrello.length > 0);
  }

  function apriManuale(tipo) {
    tipoManuale = tipo;
    const cfg = {
      prezzo:  { titolo: 'Inserisci prezzo',        sub: 'Digita il prezzo in euro',                       sym: '€', col: '#448aff', grad: 'linear-gradient(135deg,#448aff,#1565c0)' },
      sconto:  { titolo: 'Inserisci sconto',         sub: 'Digita la percentuale (es. 30)',                 sym: '%', col: '#ff9100', grad: 'linear-gradient(135deg,#ff9100,#e65100)' },
      diretto: { titolo: 'Aggiungi prezzo intero',   sub: 'Prezzo senza sconto da aggiungere al carrello', sym: '€', col: '#448aff', grad: 'linear-gradient(135deg,#448aff,#1565c0)' },
    }[tipo];
    document.getElementById('manTitolo').textContent = cfg.titolo;
    document.getElementById('manSubtitle').textContent = cfg.sub;
    document.getElementById('manSymbol').textContent = cfg.sym;
    document.getElementById('manSymbol').style.color = cfg.col;
    document.getElementById('manConfirm').style.background = cfg.grad;
    document.getElementById('manInput').value = '';
    document.getElementById('manInput').style.borderColor = '#2a2a3a';
    document.getElementById('manConfirm').style.opacity = '0.4';
    document.getElementById('modalManuale').classList.add('show');
    setTimeout(() => document.getElementById('manInput').focus(), 150);
  }

  function aggiornaBottoneConferma(input) {
    const val = parseFloat(input.value);
    const ok = val > 0 && !isNaN(val);
    input.style.borderColor = ok ? (tipoManuale === 'sconto' ? '#ff9100' : '#448aff') : '#2a2a3a';
    document.getElementById('manConfirm').style.opacity = ok ? '1' : '0.4';
  }

  function chiudiManuale() {
    document.getElementById('modalManuale').classList.remove('show');
    tipoManuale = null;
  }

  function confermaManuale() {
    const val = parseFloat(document.getElementById('manInput').value);
    if (!val || isNaN(val) || val <= 0) { document.getElementById('manInput').style.borderColor = '#ff1744'; return; }
    if (tipoManuale === 'sconto' && val > 100) { document.getElementById('manInput').style.borderColor = '#ff1744'; return; }

    if (tipoManuale === 'prezzo') {
      prezzoOriginale = val;
      const el = document.getElementById('valPrezzo');
      el.textContent = `€ ${fmt(val)}`; el.classList.remove('placeholder');
      chiudiManuale();
      setTimeout(() => apriManuale('sconto'), 300);

    } else if (tipoManuale === 'sconto') {
      percentualeSconto = val;
      const el = document.getElementById('valSconto');
      el.textContent = `${val.toFixed(0)} %`; el.classList.remove('placeholder');
      chiudiManuale();
      calcolaRisultato();

    } else if (tipoManuale === 'diretto') {
      aggiungiItem(val, `€ ${fmt(val)} (prezzo intero)`);
      chiudiManuale();
      mostraToast(`✅ € ${fmt(val)} aggiunto!`);
    }
  }

  function fmt(v) { return (!v && v !== 0) ? '0' : v % 1 === 0 ? v.toFixed(0) : v.toFixed(2); }

  function adattaFontSize(el) {
    const len = el.textContent.length;
    el.style.fontSize = len <= 8 ? 'clamp(36px,12vw,58px)' : len <= 11 ? 'clamp(28px,9vw,44px)' : 'clamp(22px,7vw,34px)';
  }

  function calcolaRisultato() {
    if (prezzoOriginale === null || percentualeSconto === null) return;
    const finale = prezzoOriginale * (1 - percentualeSconto / 100);
    const risparmio = prezzoOriginale - finale;
    ultimoFinale = finale;
    ultimaDesc = `€ ${fmt(prezzoOriginale)} − ${percentualeSconto}% → € ${fmt(finale)}`;
    const el = document.getElementById('prezzoFinale');
    el.textContent = `€ ${fmt(finale)}`;
    adattaFontSize(el);
    document.getElementById('risparmio').textContent = `💰 Risparmi € ${fmt(risparmio)}`;
    document.getElementById('risultato').classList.add('show');
  }

  function aggiungiAlCarrello() {
    if (ultimoFinale === null) return;
    aggiungiItem(ultimoFinale, ultimaDesc);
    mostraToast(`✅ Aggiunto! ${carrello.length} articol${carrello.length === 1 ? 'o' : 'i'} nel carrello`);
    resetCalc();
  }

  function aggiungiItem(prezzo, desc) {
    carrello.push({ prezzo, desc });
    salvaCarrello();
    aggiornaCarrello();
  }

  function resetCalc() {
    prezzoOriginale = null; percentualeSconto = null; ultimoFinale = null; ultimaDesc = null;
    const vp = document.getElementById('valPrezzo'); vp.textContent = 'Tocca per inserire'; vp.classList.add('placeholder');
    const vs = document.getElementById('valSconto'); vs.textContent = 'Tocca per inserire'; vs.classList.add('placeholder');
    document.getElementById('risultato').classList.remove('show');
  }

  function salvaCarrello() { localStorage.setItem('carrello', JSON.stringify(carrello)); }

  function aggiornaCarrello() {
    const badge = document.getElementById('cartBadge');
    badge.style.display = carrello.length > 0 ? 'inline' : 'none';
    badge.textContent = carrello.length;

    const list = document.getElementById('cartList');
    if (carrello.length === 0) {
      list.innerHTML = `<div class="empty-cart"><div class="empty-icon">🛒</div><p>Nessun articolo ancora.<br>Calcola uno sconto e premi<br><strong>＋ Aggiungi al carrello</strong></p></div>`;
      document.getElementById('cartTotalBar').classList.remove('show');
      return;
    }

    list.innerHTML = carrello.map((item, i) => `
      <div class="cart-item">
        <div class="cart-item-num">${i + 1}</div>
        <div class="cart-item-info">
          <div class="cart-item-desc">${item.desc}</div>
          <div class="cart-item-price">€ ${fmt(item.prezzo)}</div>
        </div>
        <button class="cart-item-del" onclick="rimuoviArticolo(${i})">✕</button>
      </div>
    `).join('');

    const totale = carrello.reduce((s, i) => s + i.prezzo, 0);
    document.getElementById('cartTotalNum').textContent = `€ ${fmt(totale)}`;
    document.getElementById('cartTotalSub').textContent = `${carrello.length} articol${carrello.length === 1 ? 'o' : 'i'}`;

    const inCart = document.getElementById('tabCart').classList.contains('active');
    if (inCart) document.getElementById('cartTotalBar').classList.add('show');
  }

  function rimuoviArticolo(i) { carrello.splice(i, 1); salvaCarrello(); aggiornaCarrello(); }

  function svuotaCarrello() {
    if (!confirm('Svuotare tutto il carrello?')) return;
    carrello = []; salvaCarrello(); aggiornaCarrello();
  }

  function mostraToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  if ('serviceWorker' in navigator) {
    const sw = `self.addEventListener('install',e=>{self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(clients.claim())});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request,{cache:'no-cache'}).catch(()=>new Response('')))});`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})),{scope:'./'}).catch(()=>{});
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && tipoManuale) confermaManuale();
    if (e.key === 'Escape' && tipoManuale) chiudiManuale();
  });

  switchTab('calc');
</script>
